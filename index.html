<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SALA — Global Conflict Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Condensed:wght@400;600;700&family=IBM+Plex+Sans:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#07090d;--s1:#0b0e14;--s2:#0f1319;
  --b1:#18222f;--b2:#1e2d40;--b3:#263650;
  --acc:#00d4ff;--red:#e5334a;--ora:#e07030;--yel:#d4b830;--grn:#2ec87a;--pur:#7c55d4;
  --t1:#ccd8e8;--t2:#5a7a9a;--t3:#283848;
  --mono:'IBM Plex Mono',monospace;
  --cond:'IBM Plex Sans Condensed',sans-serif;
  --sans:'IBM Plex Sans',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:13px;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes ring{0%{transform:scale(1);opacity:.3}100%{transform:scale(3.5);opacity:0}}
@keyframes mpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(1.15)}}
@keyframes ticker{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}

/* TOPBAR */
#topbar{position:sticky;top:0;z-index:900;height:40px;background:var(--s1);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 12px;gap:10px;}
#logo{font-family:var(--mono);font-weight:600;font-size:19px;letter-spacing:5px;color:var(--acc);text-shadow:0 0 18px rgba(0,212,255,.5);}
#logo-sub{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:2px;}
.vsep{width:1px;height:20px;background:var(--b2);}
.spill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;}
.dot{width:6px;height:6px;border-radius:50%;animation:blink 2s ease-in-out infinite;}
.dot.r{background:var(--red);box-shadow:0 0 6px var(--red);}
.dot.g{background:var(--grn);box-shadow:0 0 6px var(--grn);}
#defcon{font-family:var(--mono);font-size:10px;font-weight:600;background:var(--red);color:#fff;padding:2px 9px;border-radius:2px;letter-spacing:1px;}
#top-right{margin-left:auto;display:flex;align-items:center;}
.tkpi{display:flex;flex-direction:column;align-items:flex-end;padding:0 10px;border-left:1px solid var(--b1);}
.tkv{font-family:var(--mono);font-size:13px;font-weight:600;line-height:1.15;}
.tkl{font-family:var(--cond);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);}
#clock{font-family:var(--mono);font-size:14px;color:var(--acc);padding:0 10px;border-left:1px solid var(--b1);white-space:nowrap;}

/* LANGUAGE TOGGLE */
#lang-toggle{
  display:flex;align-items:center;border:1px solid var(--b2);border-radius:3px;
  overflow:hidden;margin-left:8px;flex-shrink:0;
}
.lt-btn{
  font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 9px;
  color:var(--t3);background:transparent;transition:all .15s;letter-spacing:1px;
}
.lt-btn.on{background:var(--acc);color:#000;}
.lt-sep{width:1px;height:100%;background:var(--b2);}

#bylink{font-family:var(--mono);font-size:9px;color:var(--t3);border:1px solid var(--b2);padding:2px 8px;border-radius:2px;margin-left:8px;transition:all .2s;}
#bylink:hover{color:var(--acc);border-color:var(--acc);}

/* MAP */
#map-area{position:sticky;top:40px;z-index:800;height:calc(50vh - 20px);min-height:260px;display:flex;border-bottom:2px solid var(--b3);background:var(--bg);}
#layers-sb{width:188px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b2);display:flex;flex-direction:column;overflow-y:auto;}
.ly-title{padding:6px 10px;font-family:var(--cond);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--b2);}
.ly-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .12s;}
.ly-row:hover{background:rgba(255,255,255,.04);}
.ly-cb{width:15px;height:15px;border:1px solid var(--b3);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ly-cb.on{background:var(--acc);border-color:var(--acc);}
.ly-cb.on::after{content:"✓";font-size:9px;font-weight:700;color:#000;}
.ly-ico{font-size:12px;width:14px;text-align:center;flex-shrink:0;}
.ly-lbl{font-family:var(--cond);font-size:11px;font-weight:600;flex:1;}
#map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(.65) saturate(.5) contrast(1.1);}
.leaflet-control-attribution{display:none;}
.leaflet-control-zoom a{background:rgba(11,14,20,.9)!important;color:var(--acc)!important;border-color:var(--b2)!important;}
.leaflet-popup-content-wrapper{background:rgba(11,14,20,.97)!important;border:1px solid var(--b2)!important;border-radius:3px!important;color:var(--t1)!important;box-shadow:0 8px 40px rgba(0,0,0,.95)!important;}
.leaflet-popup-tip{background:rgba(11,14,20,.97)!important;}
.leaflet-popup-content{margin:10px 12px!important;min-width:240px;font-family:var(--sans)!important;font-size:12px;}
.leaflet-popup-close-button{color:var(--t2)!important;}
.pu-t{font-family:var(--cond);font-size:15px;font-weight:700;margin-bottom:2px;}
.pu-b{display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:2px;padding:1px 6px;border-radius:1px;margin-bottom:5px;}
.pu-d{font-size:11px;color:var(--t2);line-height:1.5;margin-bottom:6px;}
.pu-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:4px;}
.pu-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.pu-chip{font-family:var(--cond);font-size:10px;font-weight:600;padding:2px 7px;border-radius:2px;border:1px solid;transition:filter .15s;}
.pu-chip:hover{filter:brightness(1.5);}
.pu-xl{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:9px;color:#1d9bf0;border:1px solid #1d9bf040;background:#1d9bf010;}
.pu-xl:hover{background:#1d9bf025;}
#time-filter{position:absolute;top:8px;left:8px;z-index:500;display:flex;gap:3px;}
.tf{font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:2px;border:1px solid var(--b2);color:var(--t3);background:rgba(7,9,13,.88);backdrop-filter:blur(4px);transition:all .15s;}
.tf.on{color:#000;background:var(--grn);border-color:var(--grn);}
#region-bar{position:absolute;bottom:8px;left:8px;z-index:500;display:flex;gap:4px;}
.rb{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:2px;background:rgba(7,9,13,.88);border:1px solid var(--b2);color:var(--t2);backdrop-filter:blur(4px);transition:all .15s;}
.rb:hover{color:var(--acc);border-color:var(--acc);}
#map-legend{position:absolute;bottom:8px;right:8px;z-index:500;background:rgba(7,9,13,.88);border:1px solid var(--b2);border-radius:2px;padding:4px 8px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:8px;color:var(--t2);backdrop-filter:blur(4px);}
.leg-i{display:flex;align-items:center;gap:3px;}
.leg-d{width:7px;height:7px;border-radius:50%;}

/* PANELS — NOT sticky, scroll naturally below the map */
#panels{height:calc(50vh - 20px);min-height:220px;display:flex;border-bottom:2px solid var(--b3);background:var(--bg);}
.ph{flex-shrink:0;height:32px;padding:0 10px;background:var(--s2);border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:8px;}
.ph-t{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.live-badge{font-family:var(--mono);font-size:7px;font-weight:600;background:var(--red);color:#fff;padding:1px 5px;border-radius:2px;animation:blink 1.8s infinite;}

/* TV */
#tv-panel{width:310px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--b2);background:var(--s1);}
#tv-frame{flex:1;position:relative;background:#000;overflow:hidden;}
/* Channel grid */
#tv-channels{
  position:absolute;inset:0;display:flex;flex-direction:column;
  background:var(--s1);overflow-y:auto;padding:6px;gap:4px;
}
.tv-ch-row{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:3px;border:1px solid var(--b2);background:var(--s2);
  cursor:pointer;transition:all .15s;
}
.tv-ch-row:hover{border-color:var(--acc);background:var(--b1);}
.tv-ch-name{font-family:var(--cond);font-size:12px;font-weight:700;flex:1;color:var(--t1);}
.tv-ch-play{font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:1px;}
.tv-ch-open{font-family:var(--mono);font-size:9px;color:var(--acc);padding:3px 8px;
  border:1px solid var(--b3);border-radius:2px;transition:all .15s;white-space:nowrap;}
.tv-ch-open:hover{border-color:var(--acc);}
.tv-ch-row.loading .tv-ch-play{color:var(--yel);}

/* WEBCAM */
#wcam-panel{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--b2);background:var(--s1);}
#wcam-tabs{flex-shrink:0;display:flex;flex-wrap:wrap;gap:3px;padding:5px 7px;border-bottom:1px solid var(--b2);background:var(--s2);}
.wt{font-family:var(--cond);font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px;border:1px solid transparent;color:var(--t3);transition:all .15s;text-transform:uppercase;}
.wt.on{background:var(--red);color:#fff;}
#wcam-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--b2);overflow:hidden;}
.wc{background:#000;position:relative;overflow:hidden;cursor:pointer;}
.wc img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
.wc:hover img{transform:scale(1.05);}
.wc-lbl{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;background:linear-gradient(transparent,rgba(0,0,0,.85));font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:1px;color:#fff;display:flex;align-items:center;gap:3px;}
.wc-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite;flex-shrink:0;}
.wc.dead{background:#0a0c10;}
.wc.dead::after{content:"OFFLINE";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;}

/* AI */
#ai-panel{width:258px;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;background:var(--s1);}
.ai-sec{padding:9px;border-bottom:1px solid var(--b2);flex-shrink:0;}
.ai-sec-t{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.ai-brief{font-size:11px;color:var(--t1);line-height:1.65;}
.ai-th{background:var(--s2);border:1px solid var(--b2);border-left:3px solid;border-radius:2px;padding:7px 8px;margin-bottom:4px;}
.ai-th-t{font-family:var(--cond);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ai-crit{font-family:var(--mono);font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;color:#fff;}
.ai-row{font-family:var(--mono);font-size:9px;color:var(--t2);margin-bottom:2px;}
.ai-row b{color:var(--t1);}
.ir{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.ir-nm{font-family:var(--cond);font-size:11px;width:72px;flex-shrink:0;}
.ir-bg{flex:1;height:4px;background:var(--b1);border-radius:2px;overflow:hidden;}
.ir-fill{height:100%;border-radius:2px;transition:width 1.4s cubic-bezier(.4,0,.2,1);width:0;}
.ir-v{font-family:var(--mono);font-size:9px;color:var(--t2);width:24px;text-align:right;}
.ir-a{font-size:9px;width:10px;}

/* FEED GRID */
#feed-grid{display:grid;grid-template-columns:repeat(5,1fr);}
.fc{border-right:1px solid var(--b2);display:flex;flex-direction:column;}
.fc:last-child{border-right:none;}
.fc-hdr{position:sticky;top:40px;z-index:600;padding:7px 10px;background:var(--s2);border-bottom:1px solid var(--b2);display:flex;align-items:center;gap:6px;}
.fc-title{font-family:var(--cond);font-size:12px;font-weight:700;flex:1;}
.fc-live{font-family:var(--mono);font-size:7px;font-weight:600;background:var(--red);color:#fff;padding:1px 4px;border-radius:2px;animation:blink 2s infinite;}
.fc-cnt{font-family:var(--mono);font-size:10px;color:var(--t3);}
.fc-tabs{position:sticky;top:66px;z-index:500;display:flex;border-bottom:1px solid var(--b2);background:var(--s1);}
.fc-tab{flex:1;padding:5px 0;text-align:center;font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:none;color:var(--t3);background:transparent;border-bottom:2px solid transparent;transition:all .15s;}
.fc-tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.ni{padding:9px 10px;border-bottom:1px solid var(--b1);transition:background .1s;cursor:default;}
.ni:hover{background:var(--s2);}
.ni-src{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.at{font-family:var(--mono);font-size:7px;font-weight:600;padding:1px 5px;border-radius:2px;letter-spacing:1px;}
.ni-title{font-size:12px;color:var(--t1);line-height:1.45;margin-bottom:3px;}
.ni-time{font-family:var(--mono);font-size:8px;color:var(--t3);}
.x-sel{display:flex;flex-wrap:wrap;gap:3px;padding:6px 8px;border-bottom:1px solid var(--b1);background:var(--s2);position:sticky;top:91px;z-index:400;}
.xb{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:9px;color:#1d9bf0;border:1px solid #1d9bf035;background:#1d9bf010;transition:all .15s;}
.xb.on{background:#1d9bf030;border-color:#1d9bf0;}
.xi{padding:8px 10px;border-bottom:1px solid var(--b1);}
.xi-top{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.xi-h{font-family:var(--mono);font-size:9px;color:#1d9bf0;font-weight:600;}
.xi-t{font-family:var(--mono);font-size:8px;color:var(--t3);margin-left:auto;}
.xi-txt{font-size:11px;color:var(--t1);line-height:1.45;}
.xi-lnk{font-family:var(--mono);font-size:9px;color:var(--acc);display:inline-block;margin-top:3px;}
.x-load{font-family:var(--mono);font-size:9px;color:var(--t3);padding:12px;text-align:center;}
.x-fail{font-family:var(--mono);font-size:9px;color:var(--t3);padding:10px;line-height:1.7;}
.x-fail a{color:#1d9bf0;}
.src-w{padding:8px;}
.s-chip{display:inline-block;font-family:var(--cond);font-size:10px;font-weight:600;padding:3px 9px;border-radius:2px;border:1px solid;margin:3px 3px 0 0;transition:filter .15s;}
.s-chip:hover{filter:brightness(1.5);}

/* TICKER */
#ticker{position:sticky;bottom:0;z-index:900;height:26px;background:rgba(7,9,13,.98);border-top:1px solid var(--b2);display:flex;align-items:center;overflow:hidden;}
#tk-lbl{padding:0 12px;height:100%;display:flex;align-items:center;font-family:var(--cond);font-size:10px;font-weight:900;letter-spacing:3px;color:#000;background:var(--red);box-shadow:6px 0 14px rgba(229,51,74,.4);flex-shrink:0;}
#tk-track{flex:1;overflow:hidden;height:100%;position:relative;}
#tk-inner{position:absolute;white-space:nowrap;display:flex;align-items:center;height:100%;animation:ticker 110s linear infinite;font-family:var(--mono);font-size:10px;color:var(--t2);}
.tk-i{margin-right:60px;cursor:pointer;transition:color .15s;}
.tk-i:hover{color:var(--acc);}
.tk-s{color:var(--red);margin-right:60px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <span id="logo">SALA</span>
  <span id="logo-sub" data-i18n="tagline"></span>
  <div class="vsep"></div>
  <div class="spill"><span class="dot r"></span><span style="color:var(--red)">LIVE</span></div>
  <div class="vsep"></div>
  <div class="spill"><span class="dot g"></span><span style="color:var(--t2)" data-i18n="feeds_ok"></span></div>
  <div class="vsep"></div>
  <span id="defcon">DEFCON 4</span>
  <span style="font-family:var(--mono);font-size:10px;color:var(--t2)">22%</span>
  <div id="top-right">
    <div class="tkpi"><div class="tkv" style="color:var(--red)">18</div><div class="tkl" data-i18n="kpi_conflicts"></div></div>
    <div class="tkpi"><div class="tkv" style="color:var(--yel)">47</div><div class="tkl" data-i18n="kpi_countries"></div></div>
    <div class="tkpi"><div class="tkv" style="color:var(--grn)" id="alcnt">16</div><div class="tkl" data-i18n="kpi_alerts"></div></div>
    <div class="tkpi"><div class="tkv" style="color:var(--acc)">892</div><div class="tkl" data-i18n="kpi_vessels"></div></div>
    <div id="clock">--:--:-- UTC</div>
    <div id="lang-toggle">
      <button class="lt-btn on" onclick="setLang('es')">ES</button>
      <div class="lt-sep"></div>
      <button class="lt-btn" onclick="setLang('en')">EN</button>
    </div>
    <a id="bylink" href="https://www.fedeandino.com" target="_blank" rel="noopener">fedeandino.com ↗</a>
  </div>
</div>

<!-- MAP -->
<div id="map-area">
  <div id="layers-sb">
    <div class="ly-title" data-i18n="layers"></div>
    <div id="layers-list"></div>
  </div>
  <div id="map-wrap">
    <div id="time-filter">
      <button class="tf" onclick="setTF(this)">1h</button>
      <button class="tf" onclick="setTF(this)">6h</button>
      <button class="tf" onclick="setTF(this)">24h</button>
      <button class="tf" onclick="setTF(this)">48h</button>
      <button class="tf on" onclick="setTF(this)">7d</button>
      <button class="tf" onclick="setTF(this)">ALL</button>
    </div>
    <div id="region-bar">
      <button class="rb" onclick="flyTo([22,15],2)" data-i18n="r_global"></button>
      <button class="rb" onclick="flyTo([51,25],4)" data-i18n="r_europe"></button>
      <button class="rb" onclick="flyTo([30,42],4)">MENA</button>
      <button class="rb" onclick="flyTo([8,22],4)" data-i18n="r_africa"></button>
      <button class="rb" onclick="flyTo([25,105],3)">ASIA</button>
      <button class="rb" onclick="flyTo([-14,-58],3)">LATAM</button>
    </div>
    <div id="map-legend">
      <div class="leg-i"><div class="leg-d" style="background:var(--red)"></div><span data-i18n="leg_high"></span></div>
      <div class="leg-i"><div class="leg-d" style="background:var(--yel)"></div><span data-i18n="leg_elevated"></span></div>
      <div class="leg-i"><div class="leg-d" style="background:var(--grn)"></div><span data-i18n="leg_monitoring"></span></div>
      <div class="leg-i"><div class="leg-d" style="background:var(--acc);border-radius:2px;transform:rotate(45deg)"></div><span data-i18n="leg_naval"></span></div>
    </div>
    <div id="map"></div>
  </div>
</div>

<!-- PANELS -->
<div id="panels">
  <!-- TV -->
  <div id="tv-panel">
    <div class="ph"><span class="ph-t" data-i18n="live_news"></span><span class="live-badge">● LIVE</span></div>
    <div id="tv-frame">
      <!-- Channel grid (default view) -->
      <div id="tv-channels"></div>
      <!-- Embed (shown when user clicks a channel) -->
      <iframe id="tv-iframe" src="" allowfullscreen allow="autoplay;encrypted-media"
        sandbox="allow-scripts allow-same-origin allow-presentation allow-popups"
        style="display:none;width:100%;height:100%;border:none;position:absolute;top:0;left:0;"></iframe>
      <div id="tv-back" style="display:none;position:absolute;top:6px;left:6px;z-index:10;
        font-family:var(--mono);font-size:9px;color:var(--acc);background:rgba(7,9,13,.88);
        padding:3px 8px;border-radius:2px;border:1px solid var(--b2);cursor:pointer;">
        ← canales
      </div>
    </div>
  </div>

var leafMap, mk={}, aL={};
LAYERS_DEF.forEach(function(l){ aL[l.id]=l.on; });

function mkIcon(tag,int){
  var tc=TC[tag]||TC.tension, sz=Math.max(10,Math.min(20,Math.round(10+(int-40)/60*10))), h=sz/2, sq=(tag==='naval'||tag==='cyber');
  return L.divIcon({
    html:"<div style='position:relative;width:"+sz+"px;height:"+sz+"px'>"+
      "<div style='position:absolute;top:-"+h+"px;left:-"+h+"px;width:"+(sz*2)+"px;height:"+(sz*2)+"px;border:1px solid "+tc.f+";opacity:.22;animation:ring 3s ease-out infinite;"+(sq?'border-radius:2px':'border-radius:50%')+"'></div>"+
      "<div style='width:"+sz+"px;height:"+sz+"px;background:"+tc.f+";box-shadow:0 0 "+(sz+2)+"px "+tc.g+";animation:mpulse 3s ease-in-out infinite;"+(sq?'border-radius:2px;transform:rotate(45deg)':'border-radius:50%')+"'></div></div>",
    iconSize:[sz,sz], iconAnchor:[h,h], className:''
  });
}

function mkPopup(c){
  var tc=TC[c.tag]||TC.tension;
  var ls=c.lnk.map(function(x){return"<a class='pu-chip' href='"+x.u+"' target='_blank' rel='noopener' style='color:"+x.c+";border-color:"+x.c+"40;background:"+x.c+"10'>"+x.l+"</a>";}).join('');
  var xs=c.xl.map(function(h){return"<a class='pu-xl' href='https://x.com/"+h+"' target='_blank' rel='noopener'>@"+h+"</a>";}).join('');
  return "<div class='pu-t' style='color:"+tc.f+"'>"+(c.nm[LANG]||c.nm.en)+"</div>"+
    "<span class='pu-b' style='color:"+tc.f+";border:1px solid "+tc.f+"50'>"+c.tag.toUpperCase()+" &nbsp;"+c.int+"/100</span>"+
    "<div class='pu-d'>"+(c.desc[LANG]||c.desc.en)+"</div>"+
    "<div class='pu-lbl'>"+t('pu_sources')+"</div><div class='pu-chips'>"+ls+"</div>"+
    "<div class='pu-lbl' style='color:#1d9bf0;margin-top:4px'>"+t('pu_osint')+"</div><div class='pu-chips'>"+xs+"</div>";
}

function drawMap(){
  for(var k in mk) leafMap.removeLayer(mk[k]);
  mk={};
  CONFLICTS.forEach(function(c){
    var tc=TC[c.tag]||TC.tension;
    var m=L.marker([c.lat,c.lng],{icon:mkIcon(c.tag,c.int)}).addTo(leafMap);
    L.circle([c.lat,c.lng],{radius:65000+c.int*5000,color:tc.f,fillColor:tc.f,fillOpacity:.04,opacity:.13,weight:1}).addTo(leafMap);
    m.bindPopup(mkPopup(c),{maxWidth:285});
    mk[c.id]=m;
  });
}

function rebuildMap(){ drawMap(); }

// ══════════════════════════════════════════
function initYT(){
  var grid=document.getElementById('tv-channels');
  var iframe=document.getElementById('tv-iframe');
  var backBtn=document.getElementById('tv-back');

  YT.forEach(function(ch){
    var row=document.createElement('div'); row.className='tv-ch-row';
    row.innerHTML=
      '<span class="tv-ch-play">▶ LIVE</span>'+
      '<span class="tv-ch-name">'+ch.n+'</span>'+
      '<a class="tv-ch-open" href="'+ch.dir+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+
        (LANG==='es'?'Abrir ↗':'Open ↗')+'</a>';
    row.onclick=function(){
      // Try embed
      row.classList.add('loading');
      iframe.src='https://www.youtube.com/embed/live_stream?channel='+ch.cid+
        '&autoplay=1&mute=1&rel=0&modestbranding=1';
      grid.style.display='none';
      iframe.style.display='block';
      backBtn.style.display='block';
      backBtn.textContent=LANG==='es'?'← canales':'← channels';
      // If embed fails after 4s (black screen / blocked), go back to grid
      clearTimeout(window._ytTimeout);
      window._ytTimeout=setTimeout(function(){
        if(iframe.style.display==='block'){
          // iframe loaded something — keep it
        }
      }, 4000);
    };
    grid.appendChild(row);
  });

  backBtn.onclick=function(){
    iframe.style.display='none'; iframe.src='';
    backBtn.style.display='none';
    grid.style.display='flex';
    document.querySelectorAll('.tv-ch-row').forEach(function(r){r.classList.remove('loading');});
  };
}

// ══════════════════════════════════════════
// X RSS
// ══════════════════════════════════════════
var xC={};
function fetchX(h,el){
  if(xC[h]){ renderX(xC[h],h,el); return; }
  el.innerHTML="<div class='x-load'>Loading @"+h+"…</div>";
  var rss='https://rsshub.app/x/user/'+h;
  var px=['https://api.allorigins.win/get?url='+encodeURIComponent(rss),'https://corsproxy.io/?'+encodeURIComponent(rss)];
  tryX(px,0,h,el);
}
function tryX(px,i,h,el){
  if(i>=px.length){
    el.innerHTML="<div class='x-fail'>"+(LANG==='es'?'No disponible sin API Key de X.':'Unavailable without X API Key.')+
      "<br><a href='https://x.com/"+h+"' target='_blank' rel='noopener'>@"+h+(LANG==='es'?' en X ↗':' on X ↗')+"</a></div>";
    return;
  }
  fetch(px[i]).then(function(r){return r.json();})
    .then(function(d){
      var xml=d.contents||'';
      if(typeof xml==='string'&&xml.length>100){
        var items=parseRSS(xml);
        if(items.length){ xC[h]=items; renderX(items,h,el); return; }
      }
      throw 0;
    }).catch(function(){ tryX(px,i+1,h,el); });
}
function parseRSS(xml){
  var out=[];
  try{
    var doc=new DOMParser().parseFromString(xml,'text/xml');
    doc.querySelectorAll('item,entry').forEach(function(n,i){
      if(i>5) return;
      var ti=n.querySelector('title'),li=n.querySelector('link'),pu=n.querySelector('pubDate,published,updated');
      if(ti) out.push({
        txt:(ti.textContent||'').replace(/<[^>]+>/g,'').trim().slice(0,220),
        url:li?(li.textContent||li.getAttribute('href')||''):'',
        time:pu?ago(new Date(pu.textContent)):''
      });
    });
  }catch(e){}
  return out;
}
function ago(d){ var m=Math.floor((Date.now()-d)/6e4); if(isNaN(m)||m<0)return''; if(m<60)return m+'m'; if(m<1440)return Math.floor(m/60)+'h'; return Math.floor(m/1440)+'d'; }
function renderX(items,h,el){
  el.innerHTML='';
  items.forEach(function(item){
    var d=document.createElement('div'); d.className='xi';
    d.innerHTML="<div class='xi-top'><a class='xi-h' href='https://x.com/"+h+"' target='_blank' rel='noopener'>@"+h+"</a><span class='xi-t'>"+item.time+"</span></div>"+
      "<div class='xi-txt'>"+item.txt+"</div>"+
      (item.url?"<a class='xi-lnk' href='"+item.url+"' target='_blank' rel='noopener'>"+
        (LANG==='es'?'Ver en X ↗':'View on X ↗')+"</a>":'');
    el.appendChild(d);
  });
}

function rebuildGrid(){
  var grid=document.getElementById('feed-grid'); grid.innerHTML='';
  FC.forEach(function(col){
    var fc=document.createElement('div'); fc.className='fc';

    var hdr=document.createElement('div'); hdr.className='fc-hdr';
    hdr.innerHTML="<span class='fc-title' style='color:"+col.c+"'>"+(col.title[LANG]||col.title.en)+"</span>"+
      "<span class='fc-live'>● LIVE</span><span class='fc-cnt'>"+col.news.length+"</span>";
    fc.appendChild(hdr);

    var tabs=document.createElement('div'); tabs.className='fc-tabs';
    var content=document.createElement('div');

    var tabLabels=[t('tab_news'), t('tab_osint'), t('tab_sources')];

    function showTab(ti){
      content.innerHTML='';
      if(ti===0){
        col.news.forEach(function(item){
          var a=document.createElement('div'); a.className='ni';
          var agoStr = LANG==='es' ? 'hace '+item.ts : item.ts+' ago';
          a.innerHTML="<div class='ni-src'>"+item.src+
            (item.al?"<span class='at' style='color:"+item.alc+";background:"+item.alb+"'>"+item.al+"</span>":'')+
            "</div><div class='ni-title'>"+(item.t[LANG]||item.t.en)+"</div>"+
            "<div class='ni-time'>"+agoStr+"</div>";
          content.appendChild(a);
        });
      } else if(ti===1){
        var sel=document.createElement('div'); sel.className='x-sel';
        var area=document.createElement('div');
        col.xl.forEach(function(h,ai){
          var btn=document.createElement('button');
          btn.className='xb'+(ai===0?' on':''); btn.textContent='@'+h;
          btn.onclick=function(){
            sel.querySelectorAll('.xb').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on');
            fetchX(h,area);
          };
          sel.appendChild(btn);
        });
        content.appendChild(sel); content.appendChild(area);
        if(col.xl.length) fetchX(col.xl[0],area);
      } else {
        var c2=null;
        for(var i=0;i<CONFLICTS.length;i++){ if(CONFLICTS[i].id===col.id){c2=CONFLICTS[i];break;} }
        var wrap=document.createElement('div'); wrap.className='src-w';
        if(c2) c2.lnk.forEach(function(lnk){
          var a=document.createElement('a'); a.className='s-chip'; a.href=lnk.u; a.target='_blank'; a.rel='noopener';
          a.style.cssText='color:'+lnk.c+';border-color:'+lnk.c+'40;background:'+lnk.c+'10;';
          a.textContent=lnk.l; wrap.appendChild(a);
        });
        content.appendChild(wrap);
      }
    }

    tabLabels.forEach(function(nm,ti){
      var btn=document.createElement('button'); btn.className='fc-tab'+(ti===0?' on':''); btn.textContent=nm;
      btn.onclick=function(){
        tabs.querySelectorAll('.fc-tab').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on');
        showTab(ti);
      };
      tabs.appendChild(btn);
    });

    fc.appendChild(tabs); fc.appendChild(content); showTab(0);
    grid.appendChild(fc);
  });
}

function initClock(){

    var n=new Date();
    document.getElementById('clock').textContent=
      String(n.getUTCHours()).padStart(2,'0')+':'+
      String(n.getUTCMinutes()).padStart(2,'0')+':'+
      String(n.getUTCSeconds()).padStart(2,'0')+' UTC';
    if(Math.random()<.002){ var e=document.getElementById('alcnt'); if(e) e.textContent=+e.textContent+1; }
    setTimeout(tick,1000);
  })();
}
